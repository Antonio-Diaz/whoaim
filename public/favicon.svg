<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .terminal-bg { fill: #080c10; }
      .terminal-border { stroke: #00E5FF; stroke-width: 2; fill: none; }
      .terminal-dot { fill: #ff5f57; }
      .terminal-dot-2 { fill: #febc2e; }
      .terminal-dot-3 { fill: #28c840; }
      .terminal-text { fill: #00E5FF; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="terminal-bg" width="100" height="100"/>
  
  <!-- Terminal window -->
  <rect class="terminal-border" x="10" y="10" width="80" height="80" rx="4"/>
  
  <!-- Title bar -->
  <rect class="terminal-bg" x="10" y="10" width="80" height="18" rx="4"/>
  <line class="terminal-border" x1="10" y1="28" x2="90" y2="28"/>
  
  <!-- Dots -->
  <circle class="terminal-dot" cx="18" cy="17" r="2"/>
  <circle class="terminal-dot-2" cx="28" cy="17" r="2"/>
  <circle class="terminal-dot-3" cx="38" cy="17" r="2"/>
  
  <!-- Terminal content -->
  <text class="terminal-text" x="18" y="48">$</text>
  <text class="terminal-text" x="30" y="48" opacity="0.8">_</text>
  
  <!-- Code lines -->
  <line stroke="#00E5FF" stroke-width="1.5" x1="18" y1="58" x2="45" y2="58" opacity="0.6"/>
  <line stroke="#00E5FF" stroke-width="1.5" x1="18" y1="68" x2="65" y2="68" opacity="0.4"/>
</svg>